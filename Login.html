<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <h1>Welcome</h1>
        <p>Join us and explore amazing UI/UX experiences</p>
        <img src="login.jpg" height="400px" width="400px">
    </div>

    <!-- Right Side -->
    <div class="right">

        <!-- Login Form -->
        <form id="loginForm" class="form active">
            <h2>Login</h2>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p>Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="form">
            <h2>Sign Up</h2>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button type="submit">Create Account</button>
            <p>Already have an account? <span onclick="showLogin()">Login</span></p>
        </form>

    </div>

</div>

<script> 
    function showSignup() {
    document.getElementById("loginForm").classList.remove("active");
    document.getElementById("signupForm").classList.add("active");
}

function showLogin() {
    document.getElementById("signupForm").classList.remove("active");
    document.getElementById("loginForm").classList.add("active");
}

// Basic validation example
document.getElementById("signupForm").addEventListener("submit", function(e){
    let pass = this.querySelectorAll("input")[2].value;
    let confirm = this.querySelectorAll("input")[3].value;

    if(pass !== confirm){
        alert("Passwords do not match!");
        e.preventDefault();
    }
});
</script>
</body>
</html>
